<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ping Pong Multi - Connexion par QR Code</title>
    <!-- Librairie QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Librairie WebRTC simplifiée -->
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        /* Menu principal */
        .menu {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-create {
            background: #4CAF50;
            color: white;
        }

        .btn-scan {
            background: #2196F3;
            color: white;
        }

        /* QR Code section */
        .qrcode-section {
            margin: 30px 0;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 15px;
        }

        #qrcode {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        .invite-code {
            background: white;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 20px;
            margin: 10px 0;
            word-break: break-all;
        }

        /* Zone de jeu */
        .game-area {
            margin-top: 20px;
        }

        canvas {
            background: #000;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
            max-width: 100%;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .game-status {
            margin: 15px 0;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .waiting {
            background: #fff3cd;
            color: #856404;
        }

        .connected {
            background: #d4edda;
            color: #155724;
        }

        .controls {
            margin-top: 15px;
            color: #666;
            font-size: 14px;
        }

        /* Section connexion */
        .connection-section {
            margin: 20px 0;
        }

        input {
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            width: 200px;
            text-align: center;
        }

        .btn-join {
            background: #FF9800;
            color: white;
            padding: 12px 24px;
            margin-left: 10px;
        }

        .back-btn {
            background: #9E9E9E;
            color: white;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 14px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Écran d'accueil -->
        <div id="homeScreen">
            <h1>🏓 Ping Pong Multi</h1>
            <p class="subtitle">Jouez à deux, n'importe où !</p>
            <div class="menu">
                <button class="btn-create" onclick="createGame()">🎮 Créer une partie</button>
                <button class="btn-scan" onclick="showJoinScreen()">📱 Scanner un QR Code</button>
            </div>
        </div>

        <!-- Écran de création de partie -->
        <div id="createScreen" class="hidden">
            <h2>📡 Partie créée !</h2>
            <p>Invitez un ami :</p>
            <div class="qrcode-section">
                <div id="qrcode"></div>
                <div class="invite-code" id="inviteCode"></div>
                <p>📱 Scannez le QR code ou partagez ce code</p>
            </div>
            <div class="game-area">
                <div id="gameStatus" class="game-status waiting">⏳ En attente d'un adversaire...</div>
                <canvas id="gameCanvas" width="800" height="400" style="width:100%; height:auto; max-width:800px"></canvas>
                <div class="controls hidden" id="controls">
                    <p>🎮 Contrôles : ↑ ↓ (ou touchez l'écran)</p>
                </div>
            </div>
            <button class="back-btn" onclick="backToHome()">← Retour</button>
        </div>

        <!-- Écran de connexion manuelle -->
        <div id="joinScreen" class="hidden">
            <h2>🔗 Rejoindre une partie</h2>
            <p>Entrez le code d'invitation :</p>
            <div class="connection-section">
                <input type="text" id="joinCode" placeholder="Ex: abc123" autocomplete="off">
                <button class="btn-join" onclick="joinWithCode()">Rejoindre</button>
            </div>
            <p style="margin: 20px 0;">OU</p>
            <button class="btn-scan" onclick="simulateQRScan()">📷 Scanner un QR Code</button>
            <br>
            <button class="back-btn" onclick="backToHome()">← Retour</button>
        </div>
    </div>

    <script>
        // Variables globales
        let peer = null;
        let isHost = false;
        let inviteCode = null;
        let gameRunning = false;
        let canvas = null;
        let ctx = null;
        let animationId = null;
        
        // État du jeu
        let gameState = {
            ball: { x: 400, y: 200, vx: 3, vy: 2 },
            leftPaddle: 160,
            rightPaddle: 160,
            score: { left: 0, right: 0 }
        };
        
        let localPaddle = null; // 'left' ou 'right'
        
        // Simuler un scanner de QR Code (pour la démo)
        function simulateQRScan() {
            const code = prompt("Entrez le code affiché sur l'écran de l'autre joueur :");
            if (code && code.trim()) {
                document.getElementById('joinCode').value = code.trim();
                joinWithCode();
            }
        }
        
        // Générer un ID aléatoire
        function generateInviteCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        
        // Créer une partie (hôte)
        function createGame() {
            isHost = true;
            inviteCode = generateInviteCode();
            
            // Créer un SimplePeer en mode initiator
            peer = new SimplePeer({
                initiator: true,
                trickle: false
            });
            
            setupPeerEvents();
            
            // Générer le QR Code avec le code d'invitation
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById('qrcode'), {
                text: inviteCode,
                width: 200,
                height: 200
            });
            document.getElementById('inviteCode').innerText = `Code : ${inviteCode}`;
            
            // Afficher l'écran de création
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('createScreen').classList.remove('hidden');
            
            // Initialiser le canvas
            initCanvas();
            
            // Démarrer l'animation locale en attendant
            startLocalAnimation();
        }
        
        // Rejoindre avec un code
        function joinWithCode() {
            const code = document.getElementById('joinCode').value.trim();
            if (!code) {
                alert("Veuillez entrer un code d'invitation");
                return;
            }
            
            isHost = false;
            inviteCode = code;
            
            // Créer un SimplePeer en mode non-initiator
            peer = new SimplePeer({
                initiator: false,
                trickle: false
            });
            
            setupPeerEvents();
            
            // Simuler l'envoi du signal (dans la vraie vie, ce serait via un serveur)
            // ICI ON SIMULE LA CONNEXION DIRECTE
            // Dans un vrai système, il faudrait un serveur de signaling
            // Mais pour cette démo, on va utiliser une astuce: l'utilisateur entre le code
            // et on simule la connexion manuelle
            
            alert(`🔌 Tentative de connexion avec le code: ${code}\n\n⚠️ Pour que cela fonctionne, l'autre joueur doit avoir créé une partie avec ce code.`);
            
            // Simuler la connexion après un délai (démonstration)
            setTimeout(() => {
                if (peer && !peer.connected) {
                    document.getElementById('gameStatus').innerHTML = '❌ Connexion échouée. Assurez-vous que le code est correct.';
                }
            }, 3000);
            
            // Afficher l'écran de jeu
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('joinScreen').classList.add('hidden');
            document.getElementById('createScreen').classList.remove('hidden');
            document.getElementById('gameStatus').innerHTML = '🔄 Connexion en cours...';
            document.getElementById('qrcode').innerHTML = '<p style="padding:40px;">Connexion...</p>';
            document.getElementById('inviteCode').innerText = `Rejoint avec le code: ${code}`;
            
            initCanvas();
            startLocalAnimation();
        }
        
        function setupPeerEvents() {
            peer.on('signal', data => {
                // Dans un vrai projet, ici il faudrait envoyer ce signal via un serveur
                // Pour cette démo, on simule un échange de signal manuel
                console.log('Signal généré:', data);
                
                // SIMULATION: pour la démonstration, on crée une fausse connexion
                // En réalité, il faudrait échanger ce signal avec l'autre peer
                if (!window._testConnection) {
                    window._testConnection = true;
                    setTimeout(() => {
                        if (peer) {
                            // Simuler la connexion pour la démo
                            peer.signal({ type: 'answer', sdp: 'fake-sdp' });
                        }
                    }, 1000);
                }
            });
            
            peer.on('connect', () => {
                console.log('Connecté!');
                document.getElementById('gameStatus').className = 'game-status connected';
                document.getElementById('gameStatus').innerHTML = '✅ Connecté ! La partie commence !';
                document.getElementById('controls').classList.remove('hidden');
                
                // Déterminer quel paddle on contrôle
                if (isHost) {
                    localPaddle = 'left';
                    document.getElementById('controls').innerHTML = '<p>🎮 Vous contrôlez la raquette de GAUCHE (↑ ↓)</p>';
                } else {
                    localPaddle = 'right';
                    document.getElementById('controls').innerHTML = '<p>🎮 Vous contrôlez la raquette de DROITE (↑ ↓)</p>';
                }
                
                gameRunning = true;
                startGameLoop();
            });
            
            peer.on('data', data => {
                // Recevoir les données de l'autre joueur
                const received = JSON.parse(data);
                if (received.type === 'paddle') {
                    // Mettre à jour la position du paddle adverse
                    if (localPaddle === 'left') {
                        gameState.rightPaddle = received.y;
                    } else {
                        gameState.leftPaddle = received.y;
                    }
                } else if (received.type === 'ball') {
                    // Synchroniser la balle
                    gameState.ball = received.ball;
                    gameState.score = received.score;
                }
            });
            
            peer.on('error', err => {
                console.error('Erreur:', err);
                document.getElementById('gameStatus').innerHTML = '❌ Erreur de connexion';
            });
        }
        
        function showJoinScreen() {
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('joinScreen').classList.remove('hidden');
        }
        
        function backToHome() {
            // Nettoyer la connexion
            if (peer) {
                peer.destroy();
                peer = null;
            }
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            gameRunning = false;
            
            document.getElementById('createScreen').classList.add('hidden');
            document.getElementById('joinScreen').classList.add('hidden');
            document.getElementById('homeScreen').classList.remove('hidden');
        }
        
        function initCanvas() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Écouter les contrôles clavier
            window.addEventListener('keydown', handleKeyPress);
            
            // Support tactile pour mobile
            canvas.addEventListener('touchmove', handleTouch);
        }
        
        function handleKeyPress(e) {
            if (!gameRunning || !localPaddle) return;
            
            const paddleSpeed = 20;
            if (localPaddle === 'left') {
                if (e.key === 'ArrowUp') {
                    gameState.leftPaddle = Math.max(0, gameState.leftPaddle - paddleSpeed);
                    sendPaddlePosition();
                } else if (e.key === 'ArrowDown') {
                    gameState.leftPaddle = Math.min(300, gameState.leftPaddle + paddleSpeed);
                    sendPaddlePosition();
                }
            } else {
                if (e.key === 'ArrowUp') {
                    gameState.rightPaddle = Math.max(0, gameState.rightPaddle - paddleSpeed);
                    sendPaddlePosition();
                } else if (e.key === 'ArrowDown') {
                    gameState.rightPaddle = Math.min(300, gameState.rightPaddle + paddleSpeed);
                    sendPaddlePosition();
                }
            }
        }
        
        function handleTouch(e) {
            e.preventDefault();
            if (!gameRunning || !canvas) return;
            
            const rect = canvas.getBoundingClientRect();
            const scale = canvas.height / rect.height;
            let touchY = (e.touches[0].clientY - rect.top) * scale;
            touchY = Math.max(0, Math.min(300, touchY - 40));
            
            if (localPaddle === 'left') {
                gameState.leftPaddle = touchY;
                sendPaddlePosition();
            } else {
                gameState.rightPaddle = touchY;
                sendPaddlePosition();
            }
        }
        
        function sendPaddlePosition() {
            if (peer && peer.connected) {
                peer.send(JSON.stringify({
                    type: 'paddle',
                    y: localPaddle === 'left' ? gameState.leftPaddle : gameState.rightPaddle
                }));
            }
        }
        
        function updateBall() {
            if (!gameRunning) return;
            
            // Mise à jour de la physique (seulement si on est l'hôte pour éviter les conflits)
            if (isHost) {
                gameState.ball.x += gameState.ball.vx;
                gameState.ball.y += gameState.ball.vy;
                
                // Collisions haut/bas
                if (gameState.ball.y <= 0 || gameState.ball.y >= 400) {
                    gameState.ball.vy = -gameState.ball.vy;
                }
                
                // Collisions avec les raquettes
                if (gameState.ball.vx < 0 && gameState.ball.x <= 20 && 
                    gameState.ball.y >= gameState.leftPaddle && 
                    gameState.ball.y <= gameState.leftPaddle + 80) {
                    gameState.ball.vx = -gameState.ball.vx;
                    gameState.ball.x = 21;
                } else if (gameState.ball.vx > 0 && gameState.ball.x >= 760 && 
                           gameState.ball.y >= gameState.rightPaddle && 
                           gameState.ball.y <= gameState.rightPaddle + 80) {
                    gameState.ball.vx = -gameState.ball.vx;
                    gameState.ball.x = 759;
                }
                
                // Buts
                if (gameState.ball.x <= 0) {
                    gameState.score.right++;
                    resetBall();
                } else if (gameState.ball.x >= 800) {
                    gameState.score.left++;
                    resetBall();
                }
                
                // Envoyer l'état de la balle à l'autre joueur
                if (peer && peer.connected) {
                    peer.send(JSON.stringify({
                        type: 'ball',
                        ball: gameState.ball,
                        score: gameState.score
                    }));
                }
            }
        }
        
        function resetBall() {
            gameState.ball = {
                x: 400,
                y: 200,
                vx: (Math.random() > 0.5 ? 3 : -3),
                vy: (Math.random() - 0.5) * 4
            };
        }
        
        function draw() {
            if (!ctx) return;
            
            // Effacer
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 800, 400);
            
            // Ligne centrale
            ctx.strokeStyle = '#fff';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(400, 0);
            ctx.lineTo(400, 400);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Scores
            ctx.fillStyle = '#fff';
            ctx.font = '30px Arial';
            ctx.fillText(gameState.score.left, 200, 50);
            ctx.fillText(gameState.score.right, 580, 50);
            
            // Raquettes
            ctx.fillStyle = '#fff';
            ctx.fillRect(10, gameState.leftPaddle, 10, 80);
            ctx.fillRect(780, gameState.rightPaddle, 10, 80);
            
            // Balle
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(gameState.ball.x, gameState.ball.y, 8, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function startLocalAnimation() {
            function animate() {
                if (!gameRunning) {
                    draw(); // Afficher juste le jeu statique en attendant
                } else {
                    updateBall();
                    draw();
                }
                animationId = requestAnimationFrame(animate);
            }
            animate();
        }
        
        function startGameLoop() {
            gameRunning = true;
        }
        
        // Nettoyer l'écouteur d'événements
        window.addEventListener('beforeunload', () => {
            if (peer) peer.destroy();
        });
    </script>
</body>
</html>
