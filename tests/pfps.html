<!DOCTYPE html>
<html>
<head>
  <title>Jeu P2P - Pierre Feuille Ciseaux</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- PeerJS avec serveur public fiable -->
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <!-- QR Code -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <!-- Scanner QR (alternative si Instascan ne marche pas) -->
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/dist/umd/index.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f9f9f9;
    }
    .screen { display: none; }
    .active { display: block; }
    button {
      padding: 12px 24px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #45a049; }
    button:disabled { background: #cccccc; cursor: not-allowed; }
    input {
      padding: 10px;
      font-size: 16px;
      margin: 8px;
      width: 200px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    #qrcode {
      margin: 20px auto;
      width: 200px;
      height: 200px;
    }
    #preview {
      width: 100%;
      max-width: 300px;
      border: 1px solid #ddd;
      margin: 10px auto;
    }
    .game-buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px 0;
    }
    .game-buttons button {
      font-size: 18px;
      padding: 15px 20px;
    }
    #gameResult {
      margin-top: 20px;
      min-height: 60px;
      padding: 15px;
      background: white;
      border-radius: 4px;
      text-align: left;
      border: 1px solid #ddd;
    }
    h1 { color: #333; }
    .status { margin: 15px 0; font-size: 18px; color: #555; }
    .error { color: red; }
    #debug { font-size: 12px; color: #888; text-align: left; margin-top: 20px; }
  </style>
</head>
<body>

  <!-- Écran d'accueil -->
  <div id="homeScreen" class="screen active">
    <h1>🎮 Jeu P2P</h1>
    <p><strong>Pierre - Feuille - Ciseaux</strong></p>
    <p style="font-size: 14px; color: #666;">(Ouvrez ce fichier sur deux appareils différents)</p>
    <div>
      <button id="createBtn">🆕 Créer une partie</button>
      <button id="joinBtn">🔗 Rejoindre une partie</button>
    </div>
    <div id="debug"></div>
  </div>

  <!-- Écran de création -->
  <div id="createScreen" class="screen">
    <h1>Partie créée !</h1>
    <p>Code de partie : <strong id="partyCode"></strong></p>
    <div id="qrcode"></div>
    <p class="status">Attendez qu'un adversaire scanne ce QR Code ou entre le code.</p>
    <p style="font-size: 14px; color: #666;">Lien direct : <span id="partyUrl" style="word-break: break-all;"></span></p>
  </div>

  <!-- Écran de rejoindre -->
  <div id="joinScreen" class="screen">
    <h1>Rejoindre une partie</h1>
    <div>
      <button id="scanBtn">📷 Scanner QR Code</button>
      <p>OU</p>
      <input type="text" id="partyCodeInput" placeholder="Code de partie (ex: PARTY_ABC123)">
      <button id="joinManualBtn">Rejoindre</button>
    </div>
    <div id="scanner" style="display: none;">
      <video id="preview" playsinline></video>
      <button id="stopScanBtn" style="margin-top: 10px;">Arrêter le scan</button>
    </div>
    <p id="joinStatus" class="status"></p>
  </div>

  <!-- Écran de jeu -->
  <div id="gameScreen" class="screen">
    <h1>Partie : <span id="gamePartyCode"></span></h1>
    <p id="gameStatus" class="status">Connexion en cours...</p>
    <div class="game-buttons">
      <button onclick="makeChoice('Pierre')" id="pierreBtn">✊ Pierre</button>
      <button onclick="makeChoice('Feuille')" id="feuilleBtn">✋ Feuille</button>
      <button onclick="makeChoice('Ciseaux')" id="ciseauxBtn">✌️ Ciseaux</button>
    </div>
    <div id="gameResult"></div>
    <div id="debugGame"></div>
  </div>

  <script>
    // --- Variables globales ---
    let peer = null;
    let conn = null;
    let partyId = null;
    let role = null;
    let myChoice = null;
    let opponentChoice = null;
    let scannerInstance = null;
    let codeReader = null;
    let stream = null;

    // --- Éléments DOM ---
    const screens = {
      home: document.getElementById('homeScreen'),
      create: document.getElementById('createScreen'),
      join: document.getElementById('joinScreen'),
      game: document.getElementById('gameScreen')
    };
    const scannerDiv = document.getElementById('scanner');
    const preview = document.getElementById('preview');
    const stopScanBtn = document.getElementById('stopScanBtn');
    const debugEl = document.getElementById('debug');
    const debugGameEl = document.getElementById('debugGame');

    // --- Fonctions utilitaires ---
    function log(message) {
      console.log(message);
      debugEl.textContent += message + '\n';
    }

    function logGame(message) {
      debugGameEl.textContent += message + '\n';
    }

    function showScreen(screenName) {
      Object.values(screens).forEach(screen => screen.classList.remove('active'));
      screens[screenName].classList.add('active');
    }

    function generatePartyId() {
      return 'PARTY_' + Math.random().toString(36).substr(2, 6).toUpperCase();
    }

    function determineWinner(choice1, choice2) {
      if (choice1 === choice2) return "➖ Égalité !";
      if (
        (choice1 === "Pierre" && choice2 === "Ciseaux") ||
        (choice1 === "Feuille" && choice2 === "Pierre") ||
        (choice1 === "Ciseaux" && choice2 === "Feuille")
      ) return "✅ Vous gagnez !";
      return "❌ Vous perdez !";
    }

    // --- Configurer PeerJS avec un serveur fiable ---
    function initPeer(id = null) {
      return new Peer(id, {
        host: 'peerjs-server.herokuapp.com',  // Serveur public alternatif
        port: 443,
        path: '/peerjs',
        secure: true,
        debug: 2
      });
    }

    // --- Configurer le jeu ---
    function setupGame(connection) {
      conn = connection;

      connection.on('open', () => {
        logGame('✅ Connexion établie !');
        showScreen('game');
        document.getElementById('gamePartyCode').textContent = partyId;
        document.getElementById('gameStatus').textContent = '✅ Connecté ! Choisissez votre coup.';
        document.getElementById('gameResult').innerHTML = '';
        // Activer les boutons
        document.getElementById('pierreBtn').disabled = false;
        document.getElementById('feuilleBtn').disabled = false;
        document.getElementById('ciseauxBtn').disabled = false;
      });

      connection.on('data', (data) => {
        logGame(`Reçu: ${JSON.stringify(data)}`);
        if (data.type === 'choice') {
          opponentChoice = data.choice;
          document.getElementById('gameResult').innerHTML += `<p><strong>Adversaire</strong> : ${data.choice}</p>`;

          if (myChoice) {
            const result = determineWinner(myChoice, opponentChoice);
            document.getElementById('gameResult').innerHTML += `<p><strong>${result}</strong></p><hr>`;
            myChoice = null;
            opponentChoice = null;
          }
        }
      });

      connection.on('close', () => {
        logGame('❌ Déconnecté');
        document.getElementById('gameStatus').textContent = '❌ Déconnecté. Attente...';
        document.getElementById('pierreBtn').disabled = true;
        document.getElementById('feuilleBtn').disabled = true;
        document.getElementById('ciseauxBtn').disabled = true;
      });

      connection.on('error', (err) => {
        logGame(`⚠️ Erreur: ${err.message}`);
        document.getElementById('gameStatus').textContent = '⚠️ Erreur de connexion.';
      });
    }

    // --- Créer une partie ---
    document.getElementById('createBtn').addEventListener('click', () => {
      partyId = generatePartyId();
      role = 'host';
      log(`Création de la partie: ${partyId}`);

      peer = initPeer(partyId);

      peer.on('open', (id) => {
        log(`Peer ouvert avec ID: ${id}`);
        document.getElementById('partyCode').textContent = partyId;
        const url = `${window.location.origin}${window.location.pathname}?partyId=${partyId}`;
        document.getElementById('partyUrl').textContent = url;
        new QRCode(document.getElementById('qrcode'), url);
        showScreen('create');
      });

      peer.on('connection', (connection) => {
        log('Nouvelle connexion entrante');
        setupGame(connection);
      });

      peer.on('error', (err) => {
        log(`Erreur PeerJS: ${err.message}`);
        alert(`Erreur: ${err.message}\n\nEssayez de rafraîchir la page ou vérifiez votre connexion.`);
      });
    });

    // --- Rejoindre une partie (scan QR avec ZXing) ---
    document.getElementById('scanBtn').addEventListener('click', async () => {
      showScreen('join');
      scannerDiv.style.display = 'block';
      stopScanBtn.style.display = 'block';
      document.getElementById('joinStatus').textContent = 'Scannez le QR Code...';

      try {
        // Arrêter le scan précédent si existe
        if (codeReader) {
          await codeReader.reset();
        }
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
        }

        // Initialiser le scanner ZXing
        codeReader = new ZXing.BrowserQRCodeReader();
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        preview.srcObject = stream;

        codeReader.decodeFromVideoDevice(
          null,
          preview,
          (result, err) => {
            if (result) {
              const url = new URL(result.text.startsWith('http') ? result.text : 'https://' + result.text);
              const partyIdFromQR = url.searchParams.get('partyId');
              if (partyIdFromQR) {
                codeReader.reset();
                stream.getTracks().forEach(track => track.stop());
                scannerDiv.style.display = 'none';
                stopScanBtn.style.display = 'none';
                joinParty(partyIdFromQR);
              }
            }
            if (err && err.name !== 'NotFoundException') {
              log(`Erreur scan: ${err.message}`);
            }
          }
        );
      } catch (error) {
        log(`Erreur caméra: ${error.message}`);
        alert(`Impossible d'accéder à la caméra: ${error.message}\n\nEssayez l'option manuelle.`);
        scannerDiv.style.display = 'none';
        stopScanBtn.style.display = 'none';
      }
    });

    // --- Arrêter le scan ---
    stopScanBtn.addEventListener('click', async () => {
      if (codeReader) {
        await codeReader.reset();
      }
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        preview.srcObject = null;
      }
      scannerDiv.style.display = 'none';
      stopScanBtn.style.display = 'none';
    });

    // --- Rejoindre une partie (manuellement) ---
    document.getElementById('joinManualBtn').addEventListener('click', () => {
      const partyCode = document.getElementById('partyCodeInput').value.trim();
      if (!partyCode) {
        alert('Veuillez entrer un code de partie.');
        return;
      }
      joinParty(partyCode);
    });

    // --- Fonction pour rejoindre une partie ---
    function joinParty(partyIdParam) {
      partyId = partyIdParam;
      role = 'guest';
      log(`Rejoint la partie: ${partyId}`);
      document.getElementById('joinStatus').textContent = 'Connexion en cours...';

      peer = initPeer();

      peer.on('open', (id) => {
        log(`Peer ouvert avec ID: ${id}`);
        conn = peer.connect(partyId);

        conn.on('open', () => {
          log('Connexion établie avec le créateur');
          setupGame(conn);
        });

        conn.on('error', (err) => {
          log(`Erreur de connexion: ${err.message}`);
          document.getElementById('joinStatus').textContent = '❌ Impossible de se connecter. Vérifiez le code.';
        });
      });

      peer.on('error', (err) => {
        log(`Erreur PeerJS: ${err.message}`);
        document.getElementById('joinStatus').textContent = `❌ Erreur: ${err.message}`;
      });
    }

    // --- Faire un choix (Pierre/Feuille/Ciseaux) ---
    function makeChoice(choice) {
      myChoice = choice;
      if (conn && conn.open) {
        conn.send({ type: 'choice', choice });
        document.getElementById('gameResult').innerHTML += `<p><strong>Vous</strong> : ${choice}</p>`;
        logGame(`Envoyé: ${choice}`);
      } else {
        document.getElementById('gameResult').innerHTML += '<p class="error">Erreur: pas de connexion</p>';
        logGame('Erreur: pas de connexion');
      }
    }

    // --- Gérer l'URL au chargement (si lien direct) ---
    window.addEventListener('DOMContentLoaded', () => {
      log('Page chargée');
      const urlParams = new URLSearchParams(window.location.search);
      const partyIdParam = urlParams.get('partyId');
      if (partyIdParam) {
        log(`Rejoint automatiquement la partie: ${partyIdParam}`);
        joinParty(partyIdParam);
      } else {
        log('Aucun code de partie dans l\'URL. Affichage de l\'écran d\'accueil.');
      }
    });

    // --- Gérer la fermeture de la page ---
    window.addEventListener('beforeunload', () => {
      if (conn) conn.close();
      if (peer) peer.destroy();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });
  </script>
</body>
</html>
